# Fonts
font_size 13.0
font_family      FiraCodeNerdFontComplete-Retina
bold_font        FiraCodeNerdFontComplete-Bold
italic_font      FiraCodeNerdFontComplete-Italic
bold_italic_font auto

#font_features FiraCodeNerdFontComplete-Retina +zero +onum
font_features FiraCodeNerdFontComplete-Retina +zero
disable_ligatures never

# Cursor
cursor_shape underline
cursor_text_color background
cursor_underline_thickness 1.3
cursor_stop_blinking_after 15.0

# Scrollback
scrollback_lines 2000

# Mouse
mouse_hide_wait -3.0
url_color #0087bd
url_style single
open_url_modifiers kitty_mod
open_url_with default
detect_urls yes
url_prefixes http https file ftp gemini irc gopher mailto news git

# Window Size
remember_window_size  yes
initial_window_width  640
initial_window_height 400

# Color Scheme
background_opacity 1.00
dynamic_background_opacity yes

background #2e3440
foreground #eceff1
#selection_foreground
#selection_background

active_border_color              #928374

# black
color0                           #3b4252
color8                           #4c566a

# red
color1                           #bf616a
color9                           #bf616a

# green
color2                           #a3be8c
color10                          #a3be8c

# yellow
color3                           #ebcb8b
color11                          #ebcb8b

# blue
color4                           #81a1c1
color12                          #81a1c1

# magenta
color5                           #b48ead
color13                          #b48ead

# cyan
color6                           #88c0d0
color14                          #8fbcbb

# white
color7                           #e5e9f0
color15                          #eceff4

