# Fonts
font_size 13.0
font_family      FiraCodeNerdFontComplete-Retina
bold_font        FiraCodeNerdFontComplete-Bold
italic_font      FiraCodeNerdFontComplete-Italic
bold_italic_font auto

#font_features FiraCodeNerdFontComplete-Retina +zero +onum
font_features FiraCodeNerdFontComplete-Retina +zero
disable_ligatures never

# Cursor
cursor_shape underline
cursor_text_color background
cursor_underline_thickness 1.3
cursor_stop_blinking_after 15.0

# Scrollback
scrollback_lines 2000

# Mouse
mouse_hide_wait -3.0
url_color #0087bd
url_style single
open_url_modifiers kitty_mod
open_url_with default
detect_urls yes
url_prefixes http https file ftp gemini irc gopher mailto news git

# Window Size
remember_window_size  yes
initial_window_width  640
initial_window_height 400

# Color Scheme
background_opacity 0.95
dynamic_background_opacity yes

background #263238
foreground #eceff1
#selection_foreground
#selection_background

active_border_color              #928374

# black
color0                           #263238
color8                           #37474f

# red
color1                           #e91e63
color9                           #ad1457

# green
color2                           #8bc34a
color10                          #9ccc65

# yellow
color3                           #ffc107
color11                          #ffa000

# blue
color4                           #03a9f4
color12                          #81d4fa

# magenta
color5                           #b16286
color13                          #d3869b

# cyan
color6                           #009688
color14                          #26a69a

# white
color7                           #cfd8dc
