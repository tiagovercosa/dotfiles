# Loads in my color palette
include nord.conf

# My font SlateSlatethat I downloaded above
#font_family JetBrainsMono Nerd Font
font_family Cascadia Code PL
disable_ligatures never
font_size 12.0

# Works with picom (on linux) to add some transparency
#background_opacity .95
dynamic_background_opacity true

url_color #0087bd
url_style curly

# Enable zsh as seen below
shell zsh

# Cursor
cursor #d8dee9
cursor_shape underline
cursor_text_color background
cursor_underline_thickness 1.3
cursor_stop_blinking_after 10.0
cursor_blink_interval  0

# Terminal bell
enable_audio_bell yes

#window_padding_width 3
inactive_text_alpha .7

# Size window
remenber_window_size yes
initial_window_width 640
initial_window_height 400
