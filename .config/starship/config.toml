# Don't print a new line at the start of the prompt
add_newline = false

# Make prompt a single line instead of two lines
[line_break]
disabled = false

# Replace the "❯" symbol in the prompt with "➜" ✗  
# [character]                         # The name of the module we are configuring is "character"
# success_symbol = "[➜](bold green)"  # The "success_symbol" is set to "➜" with color "bold green"

# Use custom format
# format = """
# [┌───────────────────>](bold green)
# [│](bold green)$directory$rust$package
# [└─>](bold green) """

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

#[time]
#disabled = false
#format = "🕙 [\\[$time\\]]($style)"
#time_format = "%T"
#utc_time_offset = "local"

[character]
success_symbol = "[❯](82)"
error_symbol = "[❯](196)"
vicmd_symbol = "[❯](45)"

[directory]
style = "45"
format = "[$path $read_only(#4682B4 )]($style)($read_only_style)"
#format = "[$path $read_only[\\]](bold 124)]($style)($read_only_style)"
truncation_length = 3
truncation_symbol = "…/"
read_only = "🔒" 

[username]
style_user = "white"
style_root = "black"
format = "[$user](bold 14) [in](15) "
#format = "[\\[](bold 124)[$user[@](34)](172)"
disabled = false
show_always = true

#[hostname]
#ssh_only = false
#format =  "[$hostname](80) [in](bold 15) "
#trim_at = ".companyname.com"
#disabled = false
